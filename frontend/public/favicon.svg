<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- slate 900 -->
      <stop offset="100%" stop-color="#020617" /> <!-- slate 950 -->
    </linearGradient>
    <!-- Honeycomb Accent Gradient -->
    <linearGradient id="honeyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" /> <!-- indigo 400 -->
      <stop offset="50%" stop-color="#3b82f6" /> <!-- blue 500 -->
      <stop offset="100%" stop-color="#1e40af" /> <!-- blue 800 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1" />

  <!-- Honeycomb Hexagon Cluster (Workhive Brand) -->
  <g fill="none" stroke="url(#honeyGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Center Hexagon -->
    <polygon points="50,38 60,44 60,56 50,62 40,56 40,44" />
    
    <!-- Top-Right Hexagon Fragment -->
    <path d="M60,20 L70,26 L70,38 L60,44" />
    
    <!-- Top-Left Hexagon Fragment -->
    <path d="M40,44 L30,38 L30,26 L40,20" />
    
    <!-- Bottom Hexagon Fragment -->
    <path d="M50,62 L50,78 L40,84 L30,78" />
  </g>
  
  <!-- Connecting center dot -->
  <circle cx="50" cy="50" r="4" fill="#60a5fa" />
</svg>